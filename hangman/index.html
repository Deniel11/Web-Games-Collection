<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <a id="exit" href="../">X</a>
        <h1>Hangman Game</h1>
        <div id="startArea">
            <div>
                <input type="text" id="wordInput" placeholder="Enter a word" />
                <button id="startButton" class="button">Start</button>
            </div>
            <span id="startError" class="error dnone"></span>
            <div>
                <select id="categorySelect">
                    <option value="Mix">Mix</option>
                </select>
                <button id="randomButton" class="button">Random word</button>
            </div>
        </div>
        <div id="gameArea" class="dnone">
            <div id="hangman">
                <canvas id="hangmanCanvas" width="200" height="200" class="center"></canvas>
            </div>
            <div id="wordDisplay"></div>
            <div id="triedLetters" class="center">
                <div id="alphabet" class="row"></div>
            </div>
            <div id="message"></div>
            <button id="retryButton" class="button">Retry</button>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
